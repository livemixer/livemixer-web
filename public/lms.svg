<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6A5BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00DBDE;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6A5BFF" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="220" fill="url(#gradient)" filter="url(#shadow)" opacity="0.9"/>
  
  <!-- 主图标：浏览器窗口 + 播放三角 + 声波 -->
  <g transform="translate(256, 256) scale(1.8)">
    
    <!-- 浏览器窗口外框 -->
    <rect x="-70" y="-50" width="140" height="100" rx="12" fill="none" stroke="white" stroke-width="6" opacity="0.8"/>
    
    <!-- 窗口标题栏 -->
    <rect x="-60" y="-40" width="120" height="10" rx="5" fill="white" opacity="0.9"/>
    
    <!-- 标题栏圆点 -->
    <circle cx="-45" cy="-35" r="3" fill="#FF5F57"/>
    <circle cx="-35" cy="-35" r="3" fill="#FFBD2E"/>
    <circle cx="-25" cy="-35" r="3" fill="#28CA42"/>
    
    <!-- 播放三角形（左侧） -->
    <path d="M -40 -15 L -40 25 L 0 5 Z" fill="white" opacity="0.95"/>
    
    <!-- 动态声波（右侧） -->
    <rect x="15" y="-15" width="10" height="40" rx="5" fill="white" opacity="0.9"/>
    <rect x="30" y="-25" width="10" height="60" rx="5" fill="white" opacity="0.9"/>
    <rect x="45" y="-10" width="10" height="30" rx="5" fill="white" opacity="0.9"/>
    
    <!-- 连接线（融合元素） -->
    <path d="M 0 5 L 15 -5" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    
  </g>
  
  <!-- 外圈细边框 -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
</svg>